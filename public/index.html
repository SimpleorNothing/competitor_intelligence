<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>CI — 경쟁사 전략 추적 보드 | DA 2030</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --paper:#EDEFEC; --panel:#FFFFFF; --ink:#17222D; --muted:#5C6B79;
  --line:#D3D9D6; --line-strong:#9AA6A0;
  --new:#46647E; --deep:#2F614D; --insight:#B02E24;
  --amber:#A9790F; --purple:#6B4E9B;
  --mono:'Pretendard',system-ui,-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --sans:'Pretendard',system-ui,-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
.code,.stamp,.eyebrow,.sec-label,.legend,.foot,.spark-cap,.chip,.b,
.upd,.when,.src,.mark,.cnt,.axis .kpi li{font-variant-numeric:tabular-nums}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important;animation:none!important}}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px}

/* ── 헤더 ── */
header{border-bottom:2px solid var(--ink);background:var(--paper);position:sticky;top:0;z-index:20}
.hd{display:flex;align-items:baseline;gap:14px;padding:14px 0;flex-wrap:wrap}
.hd .mark{font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:.08em;background:var(--ink);color:var(--paper);padding:3px 8px}
.hd h1{font-size:17px;font-weight:700;letter-spacing:-.01em}
.hd .sub{font-size:12.5px;color:var(--muted)}
.hd .upd{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--muted)}

/* ── 회사 탭 ── */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0 14px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:12.5px;padding:5px 12px;border:1px solid var(--line-strong);background:transparent;color:var(--muted);white-space:nowrap;cursor:default;font-family:var(--sans)}
.tab.on{background:var(--ink);color:var(--paper);border-color:var(--ink);font-weight:600}
.tab.off{opacity:.45;border-style:dashed}

/* ── L1 프레임 패널 ── */
.frame{background:var(--panel);border:1px solid var(--line-strong);border-top:4px solid var(--ink);margin:26px 0;padding:26px 28px}
.frame .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);margin-bottom:8px}
.frame h2{font-size:24px;font-weight:700;letter-spacing:-.02em;line-height:1.35}
.frame .redef{margin-top:10px;padding:10px 14px;background:var(--paper);border-left:3px solid var(--insight);font-size:13.5px}
.frame .redef b{color:var(--insight)}
.stamps{display:flex;gap:0;margin:18px 0 4px;flex-wrap:wrap}
.stamp{font-family:var(--mono);font-size:11.5px;border:1px solid var(--line-strong);padding:5px 12px;position:relative}
.stamp+.stamp{border-left:none}
.stamp b{font-weight:600}
.stamp.redefined{border-color:var(--insight);color:var(--insight);border-left:1px solid var(--insight)}
.fgrid{display:grid;grid-template-columns:1.2fr .8fr;gap:0;margin-top:16px}
.fgrid>.fcol:first-child{padding-right:24px}
.fgrid>.fcol:last-child{padding-left:24px;border-left:1px solid var(--line)}
.fcol h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--muted);margin-bottom:8px;font-weight:500}
.fcol ul{list-style:none}
.fcol li{font-size:13.5px;padding:5px 0;border-bottom:1px dotted var(--line)}
.fcol li:last-child{border-bottom:none}
.ppl{font-size:13px}
.ppl .r{font-family:var(--mono);font-size:11px;color:var(--muted);display:inline-block;min-width:96px}
.frame-actions{margin-top:16px;display:grid;grid-template-columns:1.2fr .8fr;gap:0}
.frame-actions .fa-left{display:flex;gap:8px;flex-wrap:wrap;padding-right:24px}
.frame-actions .fa-right{display:flex;align-items:flex-start;padding-left:24px;border-left:1px solid var(--line)}
.btn-ghost{font-family:var(--mono);font-size:12px;border:1px solid var(--ink);background:none;padding:6px 14px;cursor:pointer;color:var(--ink)}
a.btn-ghost{display:inline-block;text-decoration:none}
.btn-ghost:hover,.btn-ghost:focus-visible{background:var(--ink);color:var(--paper)}
.btn-ghost:focus-visible{outline:2px solid var(--insight);outline-offset:2px}

/* ── 범례 ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:0 0 12px;font-family:var(--mono)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;display:inline-block}

/* ── 축 카드 그리드 ── */
.sec-label{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);margin:30px 0 10px}
.axes{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.axis{background:var(--panel);border:1px solid var(--line-strong);padding:18px 20px 16px;cursor:pointer;text-align:left;font-family:var(--sans);display:flex;flex-direction:column;gap:10px;transition:border-color .12s}
.axis:hover{border-color:var(--ink)}
.axis:focus-visible{outline:2px solid var(--insight);outline-offset:2px}
.axis.sel{border:2px solid var(--ink);padding:17px 19px 15px}
.axis .top{display:flex;align-items:center;gap:10px}
.axis .code{font-family:var(--mono);font-weight:600;font-size:13px;background:var(--paper);border:1px solid var(--line-strong);padding:1px 7px}
.axis h3{font-size:16px;font-weight:700;letter-spacing:-.01em;flex:1;color:var(--ink)}
.chip{font-family:var(--mono);font-size:10.5px;padding:2px 8px;white-space:nowrap}
.chip.basis{border:1px solid var(--ink)}
.chip.basis.inferred{border-style:dashed;color:var(--muted);border-color:var(--muted)}
.chip.st-가속{background:var(--insight);color:#fff}
.chip.st-순항{background:var(--new);color:#fff}
.chip.st-지연{background:var(--amber);color:#fff}
.chip.st-방향전환{background:var(--purple);color:#fff}
.axis .sum{font-size:13px;color:var(--muted);line-height:1.55}
.axis .kpi{font-size:12.5px;border-top:1px dotted var(--line);padding-top:8px;margin-top:auto}
.axis .kpi li{list-style:none;padding:1.5px 0;font-family:var(--mono);font-size:11.5px;color:var(--ink)}
.axis .kpi li::before{content:"▸ ";color:var(--muted)}
/* 시그니처: 연도별 KPI 목표·실적 궤적 차트 */
.kpi-chart{margin-top:4px}
.kpi-chart svg{display:block;width:100%;height:auto;overflow:visible}
.kpi-cap{font-family:var(--mono);font-size:9.5px;color:var(--muted);display:flex;gap:11px;flex-wrap:wrap;margin-top:4px}
.kpi-cap i{display:inline-block;width:8px;height:8px;margin-right:3px;vertical-align:-1px}
.kpi-cap .sw-act{background:var(--new)}
.kpi-cap .sw-fc{background:transparent;border:1.3px solid var(--amber)}
.kpi-cap .sw-tg{background:var(--insight)}
.kpi-chart.empty{height:26px;display:flex;align-items:center;justify-content:center;border:1px dotted var(--line);margin-top:4px}
.kpi-chart.empty span{font-family:var(--mono);font-size:10px;color:var(--muted)}
.axis .foot{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;color:var(--muted)}

/* ── 타임라인 ── */
.tl{background:var(--panel);border:1px solid var(--line-strong);margin:26px 0 40px;display:none}
.tl.open{display:block}
.tl-hd{display:flex;align-items:baseline;gap:12px;padding:16px 22px;border-bottom:2px solid var(--ink);flex-wrap:wrap}
.tl-hd .code{font-family:var(--mono);font-weight:600;font-size:14px;background:var(--ink);color:var(--paper);padding:2px 9px}
.tl-hd h3{font-size:18px;font-weight:700}
.tl-hd .cnt{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--muted);background:none;border:none;padding:2px 4px;cursor:pointer}
.tl-hd .cnt:hover{color:var(--ink)}
.tl-hd .cnt:focus-visible{outline:2px solid var(--insight);outline-offset:1px}
.ev{display:grid;grid-template-columns:112px 1fr;gap:0;border-bottom:1px solid var(--line)}
.ev:last-child{border-bottom:none}
.ev .when{font-family:var(--mono);font-size:12px;padding:16px 0 16px 22px;color:var(--ink);font-weight:500;border-right:1px solid var(--line)}
.ev .body{padding:14px 22px 16px}
.ev .badges{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap}
.b{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:2px 7px}
.b.cf-사실{border:1px solid var(--deep);color:var(--deep)}
.b.cf-추론{border:1px dashed var(--new);color:var(--new)}
.b.cf-가설{border:1px dashed var(--amber);color:var(--amber)}
.b.rv{border:1px solid var(--line-strong);color:var(--muted)}
.b.rv.auto{border-color:var(--amber);color:var(--amber)}
.ev .fact{font-size:14px;font-weight:600;line-height:1.55}
.ev .interp{font-size:13px;color:var(--muted);margin-top:6px;padding-left:12px;border-left:2px solid var(--line);line-height:1.6}
.ev .interp::before{content:"해석 — ";font-family:var(--mono);font-size:10.5px;color:var(--line-strong)}
.ev .src{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:8px}
.ev .src a{color:var(--new);text-decoration:none;border-bottom:1px dotted var(--new)}
.ev .src a:hover{border-bottom-style:solid}

/* ── 인박스 ── */
.inbox{border:1px dashed var(--line-strong);background:transparent;padding:16px 20px;margin:34px 0 50px}
.inbox h3{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:500;margin-bottom:10px}
.inbox .rule{font-size:12px;color:var(--muted);line-height:1.6;margin:-4px 0 12px;padding-bottom:10px;border-bottom:1px dotted var(--line)}
.inbox .rule b{color:var(--ink);font-weight:600}
.inbox .it{font-size:13px;padding:7px 0;border-bottom:1px dotted var(--line);display:flex;gap:12px;flex-wrap:wrap}
.inbox .it:last-child{border-bottom:none}
.inbox .to{font-family:var(--mono);font-size:11px;color:var(--insight);white-space:nowrap}
.inbox .dt{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
.inbox .note{flex:1;min-width:220px}
.btn-sense{font-family:var(--mono);font-size:11px;border:1px solid var(--new);color:var(--new);background:none;padding:3px 10px;cursor:pointer;white-space:nowrap;transition:all .12s}
.btn-sense:hover{background:var(--new);color:#fff}
.btn-sense:disabled{opacity:.5;cursor:default}
.btn-sense:focus-visible{outline:2px solid var(--insight);outline-offset:2px}
.inbox-entry{border-bottom:1px dotted var(--line)}
.inbox-entry:last-child{border-bottom:none}
.inbox-entry .it{border-bottom:none}
.sense-result{margin:0 0 12px;padding:14px 16px;background:var(--panel);border:1px solid var(--line);font-size:13px;line-height:1.65}
.sense-result h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--muted);font-weight:600;margin:0 0 7px;text-transform:uppercase}
.sense-result .sec+.sec{margin-top:14px;padding-top:12px;border-top:1px dotted var(--line)}
.sense-result .mi-item{padding:6px 0;border-bottom:1px dotted var(--line)}
.sense-result .mi-item:last-child{border-bottom:none}
.sense-result .mi-hl{font-weight:600;font-size:12.5px}
.sense-result .mi-sm{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.55}
.sense-result .mi-meta{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px}
.sense-result .web-sum{white-space:pre-wrap}
.sense-result a{color:var(--new);text-decoration:none;border-bottom:1px dotted var(--new)}
.sense-result a:hover{border-bottom-style:solid}
.sense-result .muted{color:var(--muted)}
.sense-result.err{border-color:var(--insight);color:var(--insight)}
.sense-result .verdict{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;padding:2px 8px;margin-right:8px}
.sense-result .verdict.v-승격{background:var(--deep);color:#fff}
.sense-result .verdict.v-부분승격{background:var(--amber);color:#fff}
.sense-result .verdict.v-대기{border:1px solid var(--line-strong);color:var(--muted)}
.sense-result .prop{margin-top:10px;padding:10px 12px;background:var(--paper);border-left:2px solid var(--line-strong);font-size:12.5px;line-height:1.6}
.sense-result .prop .px{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
.btn-promote{font-family:var(--mono);font-size:11px;border:1px solid var(--deep);background:var(--deep);color:#fff;padding:4px 12px;cursor:pointer;margin-top:10px}
.btn-promote:hover{opacity:.85}
.btn-promote:disabled{opacity:.5;cursor:default}
.sense-result .done{margin-top:8px;font-size:12.5px;color:var(--deep)}
.sense-result .done a{color:var(--deep)}
.sense-prog{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.sense-prog .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--new);border-radius:50%;animation:ciSpin .8s linear infinite!important;flex:none}
@keyframes ciSpin{to{transform:rotate(360deg)}}
/* OS '애니메이션 줄이기' 설정에서도 작업중 표시는 유지 — 전역 animation:none 차단 예외 */
@media (prefers-reduced-motion:reduce){.sense-prog .spin{animation:ciSpin .8s linear infinite!important}}
.sense-prog .stps{display:flex;flex-wrap:wrap;gap:2px 8px}
.sense-prog .stp{white-space:nowrap}
.sense-prog .stp.on{color:var(--new);font-weight:600}
.sense-prog .stp.ok{color:var(--deep)}
.sense-prog .stp.ok::after{content:" ✓"}
.sense-prog .el{margin-left:auto;flex:none}

/* ── 확인 필요 항목 · 상시 감시(워치리스트) ── */
.watch{border:1px solid var(--line-strong);background:var(--panel);padding:16px 20px;margin:34px 0 0}
.watch h3{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:500;margin-bottom:10px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.watch h3 .sig{color:var(--insight);font-weight:600}
.watch h3 .scan{font-size:10px;letter-spacing:.04em;color:var(--line-strong);margin-left:auto}
.watch .rule{font-size:12px;color:var(--muted);line-height:1.6;margin:-4px 0 12px;padding-bottom:10px;border-bottom:1px dotted var(--line)}
.watch .rule b{color:var(--ink);font-weight:600}
.watch .rule b.mk{color:var(--insight)}
.w-it{padding:11px 0;border-bottom:1px dotted var(--line)}
.w-it:last-child{border-bottom:none}
.w-it.signal{background:color-mix(in srgb,var(--insight) 5%,transparent);border-left:3px solid var(--insight);padding-left:12px;margin-left:-12px}
.w-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.w-code{font-family:var(--mono);font-weight:600;font-size:10.5px;background:var(--paper);border:1px solid var(--line-strong);padding:1px 7px}
.w-q{font-size:13.5px;font-weight:600;flex:1;min-width:200px;line-height:1.4}
.w-pri{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border:1px solid var(--line-strong);color:var(--muted)}
.w-pri.p-상{border-color:var(--insight);color:var(--insight)}
.w-st{font-family:var(--mono);font-size:10px;padding:2px 8px;white-space:nowrap}
.w-st.watching{border:1px solid var(--line-strong);color:var(--muted)}
.w-st.signal{background:var(--insight);color:#fff}
.w-detail{font-size:12px;color:var(--muted);line-height:1.55;margin-top:6px}
.w-hits{margin-top:8px;padding:8px 12px;background:var(--paper);border-left:2px solid var(--new)}
.w-hits .hl{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--new);margin-bottom:5px}
.w-hit{font-size:12px;padding:3px 0;line-height:1.5}
.w-hit a{color:var(--new);text-decoration:none;border-bottom:1px dotted var(--new)}
.w-hit a:hover{border-bottom-style:solid}
.w-hit .hm{font-family:var(--mono);font-size:10px;color:var(--muted)}

footer{border-top:1px solid var(--line-strong);padding:16px 0 40px;font-size:11.5px;color:var(--muted);font-family:var(--mono)}
footer #ub-btn{font-size:11.5px!important}
.err{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}

@media(max-width:760px){
  .axes{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr;gap:20px}
  .fgrid>.fcol:first-child{padding-right:0}
  .fgrid>.fcol:last-child{padding-left:0;border-left:none}
  .ev{grid-template-columns:1fr}
  .ev .when{border-right:none;padding:14px 22px 0}
  .ev .body{padding-top:6px}
  .frame{padding:20px 18px}
  .hd .upd{width:100%;margin-left:0}
  .frame-actions{grid-template-columns:1fr;gap:12px}
  .frame-actions .fa-left{padding-right:0}
  .frame-actions .fa-right{padding-left:0;border-left:none}
}

/* ── KPI 진척 패널 (프레임 내 접이식) ── */
.btn-ghost.on{background:var(--ink);color:var(--paper)}
.kpi-panel{margin-top:18px;padding-top:18px;border-top:1px solid var(--line);animation:kpiIn .2s ease}
@keyframes kpiIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.kpi-lead{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:16px;max-width:820px}
.kpi-lead b{color:var(--ink)}
.kpi-verdicts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:6px}
.kpi-vcard{border:1px solid var(--line-strong);padding:12px 14px;background:var(--paper)}
.kpi-vcard .vl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
.kpi-vcard .vs{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.kpi-vcard .vs .d{width:9px;height:9px;flex:none}
.kpi-vcard .vsub{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5}
.kpi-seclabel{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);margin:22px 0 8px;padding-top:14px;border-top:1px solid var(--line)}
.kpi-row{display:grid;grid-template-columns:190px 1fr 140px;gap:16px;align-items:center;padding:13px 0;border-bottom:1px dotted var(--line)}
.kpi-row:last-child{border-bottom:none}
.kpi-idc{display:flex;flex-direction:column;gap:3px}
.kpi-idc .c{font-family:var(--mono);font-weight:600;font-size:10.5px;color:var(--muted);letter-spacing:.05em}
.kpi-idc .n{font-size:13.5px;font-weight:700;letter-spacing:-.01em;line-height:1.35}
.kpi-idc .nt{font-size:11px;color:var(--muted);line-height:1.45}
.kpi-barw{display:flex;flex-direction:column;gap:6px}
.kpi-track{position:relative;height:20px;background:var(--paper);border:1px solid var(--line)}
.kpi-fill{position:absolute;top:0;left:0;height:100%;width:0;transition:width 1s cubic-bezier(.22,.61,.36,1)}
.kpi-fill.s-behind{background:var(--amber)}
.kpi-fill.s-near{background:var(--new)}
.kpi-fill.s-ontrack{background:var(--deep)}
.kpi-fill.s-watch{background:var(--line-strong)}
.kpi-base{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.55}
.kpi-base::after{content:attr(data-label);position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap}
.kpi-alt{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--deep)}
.kpi-alt::after{content:attr(data-label);position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--deep);white-space:nowrap}
.kpi-pct{position:absolute;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10.5px;font-weight:600;color:#fff;left:7px;pointer-events:none}
.kpi-pct.out{color:var(--ink)}
.kpi-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;color:var(--muted)}
.kpi-val{text-align:right}
.kpi-val .cur{font-family:var(--mono);font-size:14px;font-weight:700}
.kpi-val .tgt{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px}
.kpi-badge{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;padding:2px 7px;margin-top:6px;color:#fff}
.kpi-badge.s-behind{background:var(--amber)}
.kpi-badge.s-near{background:var(--new)}
.kpi-badge.s-ontrack{background:var(--deep)}
.kpi-badge.s-watch{background:transparent;color:var(--muted);border:1px solid var(--line-strong)}
.kpi-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:10.5px;color:var(--muted);margin-top:14px;font-family:var(--mono);padding-top:12px;border-top:1px solid var(--line)}
.kpi-legend span{display:inline-flex;align-items:center;gap:5px}
.kpi-legend .d{width:8px;height:8px}
.kpi-notes{margin-top:16px;font-size:10.5px;color:var(--muted);line-height:1.65;font-family:var(--mono)}
.kpi-notes b{color:var(--ink)}
/* KPI 궤적 차트 — L2 축 카드의 A1 차트(kpiChartHTML) 재사용, 3열 그리드 */
.kpi-charts{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:12px}
.kpi-chartcell{border:1px solid var(--line-strong);background:var(--paper);padding:13px 15px 11px}
.kpi-chartcell .cc-h{font-size:13.5px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.kpi-chartcell .cc-s{font-family:var(--mono);font-size:10px;color:var(--muted);margin:2px 0 9px}
.kpi-chartcell .kpi-chart{margin-top:0}
@media(max-width:760px){
  .kpi-verdicts{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:1fr;gap:9px}
  .kpi-val{text-align:left}
  .kpi-charts{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="hd">
      <span class="mark">CI</span>
      <h1>경쟁사 전략 추적 보드</h1>
      <span class="sub">선언된 전략 ↔ 실행 증거의 정합성 검증</span>
      <span class="upd" id="updatedAt"></span>
    </div>
    <nav class="tabs" id="tabs" aria-label="경쟁사 선택"></nav>
  </div>
</header>

<main class="wrap" id="main">
  <div class="err" id="loading">데이터를 불러오는 중…</div>
</main>

<footer>
  <div class="wrap">
    DA 2030 · Competitor Intelligence · 증거 라벨: <b>사실</b>=1차 출처 확인 / <b>추론</b>=관측 기반 / <b>가설</b>=검증 필요 ·
    해석문은 AI 생성 후 주간 검토로 승격됩니다.
    <div style="margin-top:8px">
      <b>축 근거</b>: 공표=회사 발표 / 추론=간접 정황 일관 / 가설=미검증 ·
      <b>이행도</b>: 가속=계획보다 빠른 실행 누적 / 순항=방향 유지 / 지연=목표 대비 지연 / 방향전환=축 변경·폐기
    </div>
    <div class="updated" id="ub-footer" style="margin-top:8px">update : —</div>
  </div>
</footer>
<script defer src="/update-badge.js" data-src="/version.json"></script>

<script>
let S = null, E = null, W = null, currentAxis = null;
let tlSortAsc = true; // 타임라인 기본 정렬: 오래된순

// 세션 만료(SSO 게이트 401/403) — Worker가 미인증 요청에 로그인 페이지를
// 반환하므로 data fetch가 401/403을 받는다. 이땐 '데이터 로드 실패'가 아니라
// 세션 만료이므로, 안내 후 새로고침해 게이트(로그인)로 재진입시킨다.
function isAuthGate(r){ return r && (r.status === 401 || r.status === 403); }
function sessionExpired(){
  const el = document.getElementById('loading');
  if(el) el.innerHTML = '세션이 만료되었습니다. 로그인 페이지로 이동합니다…';
  setTimeout(function(){ location.reload(); }, 1500);
}

async function boot(){
  try{
    const [rs, re] = await Promise.all([
      fetch('data/strategies.json'),
      fetch('data/evidence.json')
    ]);
    if(isAuthGate(rs) || isAuthGate(re)) return sessionExpired();
    if(!rs.ok || !re.ok) throw 0;
    S = await rs.json(); E = await re.json();
    try{ W = await fetch('data/watchlist.json').then(r=>r.ok?r.json():null); }catch(_){ W = null; }
    render();
  }catch(err){
    document.getElementById('loading').innerHTML =
      '데이터 파일을 불러오지 못했습니다.<br>로컬에서는 <span style="font-family:var(--mono)">python3 -m http.server</span> 로 실행해 주세요.';
  }
}

function fmtDate(d){
  // "2026-04-29" → '26.04.29 / "2026-01" → '26.01
  const p = d.split('-');
  return "'" + p[0].slice(2) + '.' + p.slice(1).join('.');
}
function quarterKey(d){
  const p = d.split('-'); const y = +p[0], m = +(p[1]||1);
  return y + 'Q' + Math.ceil(m/3);
}
function quarterRange(){
  // '23Q3 ~ 현재 분기
  const out = []; let y = 2023, q = 3;
  const now = new Date(), ny = now.getFullYear(), nq = Math.ceil((now.getMonth()+1)/3);
  while (y < ny || (y === ny && q <= nq)){
    out.push(y + 'Q' + q);
    q++; if(q > 4){ q = 1; y++; }
  }
  return out;
}

function evidenceFor(axisId, ascending){
  const dir = ascending ? 1 : -1;
  return E.items.filter(i => i.axisId === axisId)
    .sort((a,b) => dir*a.date.localeCompare(b.date));
}

function kpiChartHTML(axis){
  const ks = axis.kpiSeries;
  if(!ks || !Array.isArray(ks.points) || !ks.points.length){
    return `<div class="kpi-chart empty" role="img" aria-label="정량 KPI 미공표"><span>정량 KPI 미공표 · 계열화 대상 아님</span></div>`;
  }
  const pts = ks.points.slice().sort((a,b)=>a.year-b.year);
  const yrs = pts.map(p=>p.year);
  const yr0 = Math.min(...yrs), yr1 = Math.max(...yrs);
  const unit = ks.unit || '';
  const yMax = ks.yMax || Math.max(...pts.map(p=>p.value))*1.1;
  const W=300,H=132, x0=30,x1=290, yt=14,yb=104;
  const xpad = 12; // 첫 막대가 좌측 축라벨과 겹치지 않도록 데이터 영역 왼쪽 여백
  const px = y => x0 + xpad + (yr1===yr0 ? 0 : (y-yr0)/(yr1-yr0))*(x1-x0-xpad);
  const py = v => yb - (v/yMax)*(yb-yt);
  const lab = p => p.label != null ? p.label : (p.value + unit);
  const f1 = n => (Math.round(n*10)/10);
  let g = '';
  (ks.gridlines||[]).forEach(gl => {
    g += `<line x1="${x0}" x2="${x1}" y1="${f1(py(gl))}" y2="${f1(py(gl))}" stroke="var(--line)" stroke-dasharray="1 4"/>`;
    g += `<text x="${x0-4}" y="${f1(py(gl)+3)}" text-anchor="end" font-size="8" fill="var(--muted)" font-family="var(--mono)">${gl}${unit}</text>`;
  });
  g += `<line x1="${x0}" x2="${x1}" y1="${yb}" y2="${yb}" stroke="var(--line-strong)"/>`;
  const acts = pts.filter(p=>p.kind==='actual'||p.kind==='estimate');
  const tgt = pts.find(p=>p.kind==='target');
  if(tgt && acts.length){
    const base = acts[acts.length-1];
    if(tgt.year>base.year && base.value>0){
      const r = Math.pow(tgt.value/base.value, 1/(tgt.year-base.year))-1;
      let d = `M ${f1(px(base.year))} ${f1(py(base.value))}`;
      for(let y=base.year+1; y<=tgt.year; y++){
        const v = base.value*Math.pow(1+r, y-base.year);
        d += ` L ${f1(px(y))} ${f1(py(v))}`;
      }
      g += `<path d="${d}" fill="none" stroke="var(--insight)" stroke-width="1.4" stroke-dasharray="4 3" opacity=".85"/>`;
    }
  }
  const bw = 17;
  pts.forEach(p => {
    if(p.kind==='target') return;
    const x = px(p.year)-bw/2, y = py(p.value), h = yb-y;
    const a = `x="${f1(x)}" y="${f1(y)}" width="${bw}" height="${f1(h)}"`;
    if(p.kind==='forecast'){
      g += `<rect ${a} fill="color-mix(in srgb,var(--amber) 15%,transparent)" stroke="var(--amber)" stroke-width="1.3" stroke-dasharray="3 2"/>`;
    } else if(p.kind==='estimate'){
      g += `<rect ${a} fill="var(--new)" opacity=".34"/>`;
    } else {
      g += `<rect ${a} fill="var(--new)"/>`;
    }
    g += `<text x="${f1(px(p.year))}" y="${f1(y-4)}" text-anchor="middle" font-size="8.5" fill="var(--ink)" font-family="var(--mono)" font-weight="600">${lab(p)}</text>`;
  });
  if(tgt){
    const tx = px(tgt.year), ty = py(tgt.value);
    g += `<line x1="${f1(tx-11)}" x2="${f1(tx+11)}" y1="${f1(ty)}" y2="${f1(ty)}" stroke="var(--insight)" stroke-width="2.4"/>`;
    g += `<circle cx="${f1(tx)}" cy="${f1(ty)}" r="2.6" fill="var(--insight)"/>`;
    g += `<text x="${f1(tx)}" y="${f1(ty-6)}" text-anchor="middle" font-size="8.5" fill="var(--insight)" font-family="var(--mono)" font-weight="700">${lab(tgt)}</text>`;
  }
  for(let y=yr0; y<=yr1; y++){
    g += `<text x="${f1(px(y))}" y="${H-4}" text-anchor="middle" font-size="8" fill="var(--muted)" font-family="var(--mono)">'${String(y).slice(2)}</text>`;
  }
  const cap = `<span><i class="sw-act"></i>실적</span><span><i class="sw-fc"></i>전망</span><span><i class="sw-tg"></i>목표</span>`;
  return `<div class="kpi-chart"><svg viewBox="0 0 ${W} ${H}" role="img" aria-label="${(ks.metric||'KPI')} 연도별 목표·실적">${g}</svg>
    <div class="kpi-cap">${cap}<span style="margin-left:auto">${ks.metric||''} · 단위 ${unit}</span></div></div>`;
}

// ── 확인 필요 항목 · 상시 감시(워치리스트) ─────────────────────────────
// public/data/watchlist.json 을 표시. daily cron(index.js scanWatchlist)이
// MI 뉴스와 키워드 매칭 → 신규 감지 시 status watching→signal + hits 기록.
// signal 항목을 상단·강조, 이후 우선순위(상>중>하) 순. senseEsc는 하단 정의(호이스팅).
function watchlistHTML(){
  if(!W || !Array.isArray(W.items) || !W.items.length) return '';
  const PRI = { '상':0, '중':1, '하':2 };
  const sorted = W.items.slice().sort((a,b)=>{
    const sa = a.status==='signal'?0:1, sb = b.status==='signal'?0:1;
    if(sa!==sb) return sa-sb;
    return (PRI[a.priority]!=null?PRI[a.priority]:9) - (PRI[b.priority]!=null?PRI[b.priority]:9);
  });
  const signalN = W.items.filter(i=>i.status==='signal').length;
  const scan = W.lastScan ? ('마지막 스캔 ' + senseEsc(W.lastScan)) : '스캔 대기';
  return `
  <section class="watch">
    <h3>확인 필요 항목 · 상시 감시${signalN?` · <span class="sig">신호 ${signalN}</span>`:''}<span class="scan">${scan}</span></h3>
    <p class="rule">CI 판정에서 나온 <b>재센싱 트리거</b>를 상시 감시합니다. daily로 MI 뉴스와 키워드 매칭 → 신규 감지 시 <b class="mk">◆ 신호</b>로 표시(검토 대기). 실제 축·증거 반영은 사람이 판단합니다.</p>
    ${sorted.map(w=>{
      const sig = w.status==='signal';
      const hits = Array.isArray(w.hits) ? w.hits : [];
      return `
      <div class="w-it ${sig?'signal':''}">
        <div class="w-head">
          <span class="w-code">${senseEsc(w.axisCode)}</span>
          <span class="w-q">${senseEsc(w.question)}</span>
          <span class="w-pri p-${senseEsc(w.priority)}">${senseEsc(w.priority)}</span>
          <span class="w-st ${sig?'signal':'watching'}">${sig?'◆ 신호':'감시중'}</span>
        </div>
        <div class="w-detail">${senseEsc(w.detail)}</div>
        ${hits.length?`
        <div class="w-hits">
          <div class="hl">감지 기사 ${hits.length}</div>
          ${hits.map(x=>`<div class="w-hit">${x.url?`<a href="${senseEsc(x.url)}" target="_blank" rel="noopener">${senseEsc(x.headline||x.url)}</a>`:senseEsc(x.headline||'')}<span class="hm"> · ${senseEsc(x.source||'')}${x.publishedAt?' · '+senseEsc(String(x.publishedAt).slice(0,10)):''}${x.seenAt?' · 감지 '+senseEsc(x.seenAt):''}</span></div>`).join('')}
        </div>`:''}
      </div>`;
    }).join('')}
  </section>`;
}

function render(){
  const co = S.companies.find(c => c.active);
  document.getElementById('updatedAt').textContent =
    'updated ' + S.updatedAt.slice(0,10) + ' KST';

  // 탭
  document.getElementById('tabs').innerHTML = S.companies.map(c =>
    `<span class="tab ${c.active ? 'on':'off'}" title="${c.active ? c.scopeNote : '커버리지 확장 예정'}">${c.shortName}</span>`
  ).join('');

  const f = co.frame;
  const frameEvCount = evidenceFor('lg-frame').length;

  let html = `
  <section class="frame">
    <div class="eyebrow">L1 · 전략 프레임 — ${co.name}</div>
    <h2>${f.statement}</h2>
    <div class="redef"><b>실행 재정의</b> · ${f.redefinition}</div>
    <div class="stamps">
      <span class="stamp"><b>선포</b> ${fmtDate(f.declaredAt)}</span>
      <span class="stamp redefined"><b>재정의</b> ${fmtDate(f.redefinedAt)}</span>
      <span class="stamp"><b>최종 검증</b> ${fmtDate(f.lastVerified)}</span>
    </div>
    <div class="fgrid">
      <div class="fcol">
        <h3>공표 목표</h3>
        <ul>${f.targets.map(t=>`<li>${t}</li>`).join('')}</ul>
      </div>
      <div class="fcol">
        <h3>핵심 인물</h3>
        <ul class="ppl">${f.keyPeople.map(p=>`<li><span class="r">${p.role}</span><b>${p.name}</b> <span style="color:var(--muted)">· ${p.note} (${fmtDate(p.since)}~)</span></li>`).join('')}</ul>
      </div>
    </div>
    <div class="frame-actions">
      <div class="fa-left">
        <button class="btn-ghost" onclick="openTimeline('lg-frame')">프레임 연혁 보기 (${frameEvCount}건)</button>
        <button class="btn-ghost" onclick="toggleKpi(this)" aria-expanded="false" aria-controls="kpiPanel">KPI 진척현황</button>
      </div>
      <div class="fa-right">
        <a class="btn-ghost org-link" href="/org.html" target="_blank" rel="noopener">조직도 보기 ↗</a>
      </div>
    </div>
    ${kpiPanelHTML()}
  </section>

  <div class="legend">
    <span style="margin-left:auto">이행도: 가속 / 순항 / 지연 / 방향전환</span>
  </div>

  <div class="sec-label">L2 · 추진전략 축 — 클릭하면 실행 증거 타임라인</div>
  <div class="axes">
    ${co.axes.map(a => {
      const n = evidenceFor(a.id).length;
      return `
      <button class="axis" id="card-${a.id}" onclick="openTimeline('${a.id}')" aria-expanded="false">
        <div class="top">
          <span class="code">${a.code}</span>
          <h3>${a.title}</h3>
          <span class="chip basis ${a.basis.includes('추론')||a.basis.includes('가설')?'inferred':''}">${a.basis}</span>
          <span class="chip st-${a.execStatus}">${a.execStatus}</span>
        </div>
        <div class="sum">${a.summary}</div>
        <ul class="kpi">${a.kpi.map(k=>`<li>${k}</li>`).join('')}</ul>
        ${kpiChartHTML(a)}
        <div class="foot"><span>${a.org}</span><span>증거 ${n}건 →</span></div>
      </button>`;
    }).join('')}
  </div>

  <section class="tl" id="tl" aria-live="polite"></section>

  ${watchlistHTML()}

  <section class="inbox">
    <h3>검증 대기 인박스 · 추가 센싱 요청</h3>
    <p class="rule"><b>승격 조건</b> — ① 1차 출처(공시·회사 공식 발표)로 사실 확인 ② 출처 간 수치 불일치 해소(확정치 확보) ③ 대기 중 이벤트 발생·실적 확정. 충족 시 신뢰도 라벨(사실/추론)을 달아 해당 축의 실행 증거 타임라인에 반영하고 인박스에서 제거합니다.</p>
    ${E.inbox.map(i=>`
      <div class="inbox-entry" id="ib-${i.id}">
        <div class="it">
          <span class="to">→ ${i.requestedTo}</span>
          <span class="note">${i.note}</span>
          <button type="button" class="btn-sense" onclick="senseInbox('${i.id}', this)">추가 센싱하기</button>
          <span class="dt">${fmtDate(i.createdAt)}</span>
        </div>
        <div class="sense-result" id="sr-${i.id}" hidden></div>
      </div>`).join('')}
  </section>`;

  document.getElementById('main').innerHTML = html;
  alignKpiDividers();
}

// 시그니처 카드 정렬: 같은 행(2열)의 카드끼리 KPI 목록 줄 수가 달라도
// 구분선(kpi 상단 점선)과 그 아래 스파크 차트가 같은 높이에서 시작하도록
// KPI 블록 높이를 행 단위로 맞춘다.
function alignKpiDividers(){
  const cards = Array.from(document.querySelectorAll('.axis'));
  cards.forEach(c => { const k = c.querySelector('.kpi'); if (k) k.style.minHeight = ''; });
  if (window.matchMedia('(max-width:760px)').matches) return; // 모바일은 1열이라 정렬 불필요
  for (let i = 0; i < cards.length; i += 2){
    const pair = cards.slice(i, i + 2).map(c => c.querySelector('.kpi')).filter(Boolean);
    if (pair.length < 2) continue;
    const max = Math.max(...pair.map(k => k.offsetHeight));
    pair.forEach(k => { k.style.minHeight = max + 'px'; });
  }
}
let kpiAlignResizeT = null;
window.addEventListener('resize', () => {
  clearTimeout(kpiAlignResizeT);
  kpiAlignResizeT = setTimeout(alignKpiDividers, 120);
});
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(alignKpiDividers).catch(() => {});
}

function toggleTlSort(){
  tlSortAsc = !tlSortAsc;
  if (currentAxis) openTimeline(currentAxis);
}

// ── 2030 KPI 진척현황 ─────────────────────────────────────────────────
// pct: 목표=100% 대비 도달률 / base·alt: 마커(%) / status: behind|near|ontrack|watch
const KPI_A = [
  { code:'7-1 · OPM', name:'영업이익률 7%', note:"'25 연간 2.8% → '26 1Q 7.1%",
    cur:'2.8%', tgt:'목표 7.0%', pct:40, status:'behind', alt:{ pos:100, label:"1Q 7.1%" } },
  { code:'7-2 · CAGR', name:'연평균성장률 7%', note:'이노텍 제외 22→25 실질 ≈1.5%/yr',
    cur:'≈1.5%', tgt:'목표 7.0%', pct:21, status:'behind' },
  { code:'7-3 · EV/EBITDA', name:'기업가치 7배', note:'저평가 지속 ≈4.5배',

function kpiBar(k){

function toggleKpi(btn){
  const p = document.getElementById('kpiPanel');
  if(!p) return;
  const willOpen = p.hidden;
  p.hidden = !willOpen;
  btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
  btn.classList.toggle('on', willOpen);
  if(willOpen){
    p.querySelectorAll('.kpi-fill').forEach(el => { el.style.width = '0'; });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      p.querySelectorAll('.kpi-fill').forEach(el => { el.style.width = (+el.dataset.w || 0) + '%'; });
    }));
  }
}

// ── 추가 센싱 ─────────────────────────────────────────────────────────
// 인박스 항목의 "추가 센싱하기" → Worker /api/sense 호출
//   응답: { mi:[MI DB 매칭], web:{summary} 또는 null }
function senseEsc(s){
  return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
function senseLinkify(s){
  return senseEsc(s).replace(/(https?:\/\/[^\s()<>]+)/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function sensePlain(s){
  return String(s||'').replace(/^#{1,6}\s*/gm,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1');
}
// 진행 표시 — 단계별 하이라이트 + 경과 시간 (자판기 스타일)
const SENSE_STEPS = ['MI 뉴스 DB 조회', '웹 검색·1차 출처 조사', '승격 조건 판정'];
function senseProgressHTML(){
  return '<div class="sense-prog"><span class="spin" aria-hidden="true"></span><span class="stps">' +
    SENSE_STEPS.map((s,i)=>'<span class="stp">' + (i+1) + '. ' + s + '</span>').join('') +
    '</span><span class="el">0초</span></div>';
}
function senseProgressTick(box, t0){
  const el = box.querySelector('.sense-prog'); if(!el) return;
  const sec = Math.floor((Date.now() - t0) / 1000);
  const cur = sec < 2 ? 0 : sec < 18 ? 1 : 2;
  el.querySelectorAll('.stp').forEach((s,i)=>{ s.className = 'stp' + (i < cur ? ' ok' : i === cur ? ' on' : ''); });
  const e = el.querySelector('.el'); if(e) e.textContent = sec + '초';
}
function renderSense(d){
  let h = '';
  const miN = (d.mi && d.mi.length) ? d.mi.length : 0;
  h += '<div class="sec"><h4>MI DB 매칭 · ' + (miN ? miN + '건' : '없음') + '</h4>';
  if(miN){
    h += d.mi.map(m => `
      <div class="mi-item">
        <div class="mi-hl">${m.url ? `<a href="${senseEsc(m.url)}" target="_blank" rel="noopener">${senseEsc(m.headline)}</a>` : senseEsc(m.headline)}</div>
        <div class="mi-sm">${senseEsc(m.summary||'')}</div>
        <div class="mi-meta">${senseEsc(m.source||'')}${m.publishedAt ? ' · ' + senseEsc(String(m.publishedAt).slice(0,10)) : ''}</div>
      </div>`).join('');
  } else {
    h += '<div class="muted">MI 뉴스 DB에서 매칭되는 항목이 없습니다.</div>';
  }
  h += '</div>';
  h += '<div class="sec"><h4>웹 추가 센싱</h4>';
  if(d.web && d.web.summary){
    h += '<div class="web-sum">' + senseLinkify(sensePlain(d.web.summary)) + '</div>';
    if(d.web.verdict){
      h += '<div class="prop"><span class="verdict v-' + senseEsc(d.web.verdict) + '">' + senseEsc(d.web.verdict) + '</span>' + senseEsc(d.web.reason||'');
      (d.web.items||[]).forEach(it=>{
        h += '<div style="margin-top:7px"><span class="px">[' + senseEsc(it.axisId||'') + '] ' + senseEsc(it.date||'') + ' · ' + senseEsc(it.confidence||'') + ' · ' + senseEsc((it.source&&it.source.name)||'') + '</span><br>' + senseEsc(it.event||'') + '</div>';
      });
      if(d.web.noteUpdate) h += '<div style="margin-top:7px"><span class="px">인박스 노트 갱신안</span><br>' + senseEsc(d.web.noteUpdate) + '</div>';
      if((d.web.items&&d.web.items.length) || d.web.noteUpdate || d.web.removeFromInbox){
        h += '<div><button type="button" class="btn-promote" onclick="promoteSense(\'' + senseEsc(d.id) + '\', this)">판정대로 반영하기</button></div>';
      }
      h += '</div>';
    }
  } else if(d.web && d.web.error){
    h += '<div class="muted">웹 센싱 사용 불가 — ' + senseEsc(d.web.error) + '</div>';
  } else {
    h += '<div class="muted">웹 센싱이 설정되지 않았습니다. Worker에 ANTHROPIC_API_KEY 시크릿을 추가하면 활성화됩니다.</div>';
  }
  h += '</div>';
  return h;
}
async function senseInbox(id, btn){
  const entry = E.inbox.find(x => x.id === id);
  if(!entry) return;
  const box = document.getElementById('sr-' + id);
  if(!box) return;
  // 이미 로드되어 열려있으면 토글로 닫기
  if(!box.hidden && box.dataset.loaded === '1'){ box.hidden = true; return; }
  box.hidden = false; box.className = 'sense-result'; box.dataset.loaded = '';
  box.innerHTML = senseProgressHTML();
  const _t0 = Date.now();
  senseProgressTick(box, _t0);
  const _timer = setInterval(function(){ senseProgressTick(box, _t0); }, 1000);
  if(btn){ btn.disabled = true; btn.textContent = '센싱 중…'; }
  try{
    const r = await fetch('/api/sense', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ id: entry.id, note: entry.note })
    });
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    (window.__sense = window.__sense || {})[id] = d;
    box.innerHTML = renderSense(d);
    box.dataset.loaded = '1';
  }catch(err){
    box.className = 'sense-result err';
    box.innerHTML = '센싱 실패 — ' + (err && err.message ? err.message : err) + '. 잠시 후 다시 시도하세요.';
  }finally{
    clearInterval(_timer);
    if(btn){ btn.disabled = false; btn.textContent = '추가 센싱하기'; }
  }
}

// "판정대로 반영하기" → /api/promote — evidence.json을 main에 커밋(자동 재배포)
async function promoteSense(id, btn){
  const d = (window.__sense||{})[id];
  if(!d || !d.web) return;
  btn.disabled = true; btn.textContent = '반영 중…';
  try{
    const r = await fetch('/api/promote', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        id: id,
        items: d.web.items || [],
        noteUpdate: d.web.noteUpdate || null,
        removeFromInbox: d.web.removeFromInbox === true
      })
    });
    const res = await r.json().catch(()=>({}));
    if(!r.ok || res.error) throw new Error(res.error || ('HTTP ' + r.status));
    btn.textContent = '반영 완료';
    const box = document.getElementById('sr-' + id);
    if(box){
      const pEl = document.createElement('div'); pEl.className = 'done';
      pEl.innerHTML = '커밋 완료 — 증거 +' + (res.added||0) + '건'
        + (res.removed ? ' · 인박스 제거' : '')
        + (res.noteUpdated ? ' · 노트 갱신' : '')
        + '. 1~2분 내 자동 재배포 후 새로고침하면 보드에 반영됩니다.'
        + (res.commit ? ' <a href="' + res.commit + '" target="_blank" rel="noopener">커밋 보기</a>' : '');
      box.appendChild(pEl);
    }
  }catch(err){
    btn.disabled = false; btn.textContent = '판정대로 반영하기';
    const box = document.getElementById('sr-' + id);
    if(box){
      const eEl = document.createElement('div'); eEl.className = 'done';
      eEl.style.color = 'var(--insight)';
      eEl.textContent = '반영 실패 — ' + (err && err.message ? err.message : err);
      box.appendChild(eEl);
    }
  }
}
